<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Sorteador</title>
</head>

<body class="bg-primary bg-opacity-10">

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="card shadow-lg p-4 rounded-4 col-md-6">

        <!-- PANTALLA USUARIO -->
        <div id="pantallaUsuario">

            <h3 class="text-center text-primary mb-4">
                Ingresa tu nombre
            </h3>

            <img src="logo.png" alt="imagen Logo" class="w-100">
            <input 
                type="text"
                id="nombreUsuario"
                class="form-control mb-3"
                placeholder="Tu nombre">

            <div class="text-center">
                <button id="btnContinuar"
                        class="btn btn-primary">
                    Continuar
                </button>
            </div>

        </div>


        <!-- PANTALLA PARTICIPANTES -->
        <div id="pantallaParticipantes" style="display:none;">

            <h3 class="text-center text-primary mb-3">
                Agregar participantes
            </h3>

            <input 
                type="text"
                id="nombreParticipante"
                class="form-control mb-3"
                placeholder="Nombre del participante">

            <div class="d-flex gap-2 mb-3">
                
                    <button id="btnAgregar"
                        class="btn btn-primary w-50 p-md-2">
                    Agregar
                </button>

                <button id="btnTerminar"
                        class="btn btn-secondary w-50 p-md-2">
                    Terminar
                </button>
             
                

            </div>

            <h5 class="text-secondary">Participantes:</h5>

            <!-- la lista empieza vcia we, no le pongas na -->
            <ul class="list-group" id="listaParticipantes"></ul> 

        </div>

        <!-- Pantalla Pregunta Exclusiones -->
        <div id="pantallaPreguntaExclusiones" style="display: none;">
            <h3 class="text-center text-primary mb-5">
                Exclusiones
            </h3>
            <div class="d-flex gap-2 mb-3">

                <button id="btnExcluir"
                        class="btn btn-primary w-50">
                    Excluir
                </button>

                <button id="btnOmitir"
                        class="btn btn-secondary w-50">
                    Omitir
                </button>

            </div>

        </div>


        <!-- PAntalla Exclusiones -->
        <div id="pantallaExclusiones" style="display: none;">
            <h3 class="text-center text-primary mb-4">
                Selecciona exclusiones
            </h3>
        </div>

        <!-- Pantalla Sorteo -->
        <div id="pantallaSorteo" style="display:none;">

            <h3 class="text-center text-primary mb-4">
                Resultado del Sorteo 🎉
            </h3>

            <div id="resultadoSorteo"
                class="list-group mb-3">
            </div>

            <button id="btnGenerarSorteo"
                    class="btn btn-success w-100 mb-2">
                Generar Sorteo
            </button>

        </div>

    </div>

</div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
